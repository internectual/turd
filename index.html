<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSO Decompiler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a;
      --surface: #161628;
      --surface-alt: #1a1a30;
      --border: #2a2a4a;
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #00d4ff;
      --accent-dim: #0088aa;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    header {
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 1.6em;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }
    header p {
      color: var(--text-dim);
      font-size: 0.9em;
    }
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface-alt);
    }
    .drop-zone p {
      color: var(--text-dim);
      font-size: 1em;
      margin: 0;
      white-space: nowrap;
    }
    .drop-zone p:last-child {
      font-size: 0.8em;
      opacity: 0.6;
    }
    input[type="file"] { display: none; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
    }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .file-list {
      overflow-y: auto;
      flex: 1;
    }
    .file-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .file-item:hover { background: var(--surface-alt); }
    .file-item.selected { background: var(--accent-dim); }
    .file-name {
      font-size: 0.85em;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-meta {
      font-size: 0.72em;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Main panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 70vh;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--accent-dim);
      color: var(--text);
    }
    .panel-actions {
      display: flex;
      gap: 6px;
    }
    .btn {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.75em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .panel-body {
      flex: 1;
      overflow: auto;
    }
    pre {
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82em;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 200px;
    }
    pre.error { color: var(--error); }
    .status-bar {
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      font-size: 0.75em;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* Version card */
    .version-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .version-card .label {
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .version-card .game-name {
      font-size: 1.1em;
      font-weight: 600;
      margin-top: 2px;
    }
    .version-card .version-num {
      font-family: monospace;
      color: var(--accent);
      margin-top: 2px;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 0.9em;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { max-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DSO Decompiler</h1>
      <p>Web port of <a href="https://github.com/Elletra/dso-sharp" target="_blank" rel="noreferrer" style="color:var(--accent)">Elletra/dso-sharp</a> — drop a .dso file or zip archive to decompile TorqueScript bytecode.</p>
    </header>

    <div style="margin-bottom:16px;">
      <select id="engine-select" style="background:var(--surface);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:6px;font-size:0.9em;width:260px;max-width:100%;text-overflow:ellipsis;">
        <option value="auto">Auto-detect game</option>
        <option value="TGE10">TGE 1.0–1.3</option>
        <option value="TGE14">TGE 1.4</option>
        <option value="Tribes2">Tribes 2</option>
        <option value="TFD">The Forgettable Dungeon</option>
        <option value="BlocklandV1">Blockland v1</option>
        <option value="BlocklandV20">Blockland v20</option>
        <option value="BlocklandV21">Blockland v21</option>
        <option value="Constructor">Torque Constructor</option>
      </select>
    </div>

    <div class="drop-zone" id="drop-zone" style="display:block;">
      <input type="file" id="file-input" accept="*/*" style="display:none;" />
      <p style="color:var(--text-dim);font-size:1em;margin:0;">Drag &amp; drop a .dso file or archive here, or click to browse</p>
      <p style="font-size:0.8em;margin-top:6px;opacity:0.6;color:var(--text-dim);">.dso · .zip — processed entirely in your browser</p>
    </div>

    <div class="layout" id="layout" style="display:none;">
      <aside class="sidebar">
        <div class="sidebar-header">Files</div>
        <div class="file-list" id="file-list"></div>
      </aside>

      <div>
        <div id="version-card"></div>
        <div class="panel">
          <div class="panel-header">
            <div class="tabs" id="tabs"></div>
            <div class="panel-actions">
              <button class="btn" id="copy-btn">Copy</button>
              <button class="btn" id="download-btn" disabled>Download</button>
            </div>
          </div>
          <div class="panel-body">
            <pre id="output"><div class="empty-state">Select a file to view decompiled output</div></pre>
          </div>
          <div class="status-bar" id="status"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
